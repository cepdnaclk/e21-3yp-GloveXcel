<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <style>
        :root {
            --bg-start: #f8f1e6;
            --bg-end: #d4ebef;
            --panel: #ffffff;
            --ink: #1a2a35;
            --brand: #0d6f83;
            --ok: #1f7a4c;
            --danger: #b0332f;
            --muted: #5d6b75;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            color: var(--ink);
            background:
                radial-gradient(circle at 10% 10%, rgba(255, 153, 77, 0.22), transparent 42%),
                radial-gradient(circle at 88% 82%, rgba(13, 111, 131, 0.2), transparent 44%),
                linear-gradient(145deg, var(--bg-start), var(--bg-end));
            display: grid;
            place-items: center;
            padding: 20px;
        }

        .panel {
            width: min(960px, 100%);
            background: var(--panel);
            border-radius: 18px;
            box-shadow: 0 18px 34px rgba(14, 36, 49, 0.16);
            padding: 24px;
        }

        h1 {
            margin: 0;
            font-size: 1.8rem;
        }

        p {
            color: var(--muted);
            line-height: 1.55;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .actions {
            margin-top: 18px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        button {
            border: none;
            border-radius: 10px;
            padding: 10px 14px;
            font-weight: 700;
            cursor: pointer;
        }

        .primary {
            background: var(--brand);
            color: #fff;
        }

        .ok {
            background: var(--ok);
            color: #fff;
        }

        .danger {
            background: var(--danger);
            color: #fff;
        }

        .secondary {
            background: #e8eef1;
            color: #22323c;
        }

        .request-section {
            margin-top: 20px;
        }

        .hospital-section {
            margin-top: 18px;
            border: 1px solid #d4e5eb;
            border-radius: 12px;
            padding: 12px;
            background: #f7fbfd;
        }

        .hospital-form {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr auto;
            gap: 8px;
            align-items: end;
            margin-top: 10px;
        }

        .hospital-form input {
            width: 100%;
            border: 1px solid #c9dbe3;
            border-radius: 10px;
            padding: 10px;
            font-size: 1rem;
            background: #fff;
        }

        .hospital-form label {
            display: block;
            font-size: 0.88rem;
            font-weight: 600;
            margin-bottom: 4px;
            color: #24414f;
        }

        .request-list {
            margin-top: 12px;
            display: grid;
            gap: 10px;
        }

        .request-item {
            border: 1px solid #d4e5eb;
            border-radius: 12px;
            padding: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .request-meta {
            line-height: 1.5;
            color: #21323d;
        }

        .request-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .status {
            min-height: 22px;
            margin-top: 10px;
            color: var(--muted);
            font-weight: 600;
        }

        .status.error {
            color: var(--danger);
        }

        .status.success {
            color: var(--ok);
        }

        @media (max-width: 720px) {
            .request-item {
                align-items: flex-start;
            }

            .hospital-form {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <main class="panel">
        <div class="top-bar">
            <div>
                <h1>Admin Dashboard</h1>
                <p>Review doctor signup requests and approve or reject them.</p>
            </div>
            <button class="primary" id="refreshRequestsBtn" type="button">Refresh Requests</button>
        </div>

        <div id="statusMessage" class="status"></div>

        <section class="request-section">
            <h2>Approve Requests</h2>
            <div id="requestList" class="request-list"></div>
        </section>

        <section class="hospital-section">
            <h2>Add Hospital</h2>
            <p>Add a hospital so doctors and patients can select it during signup.</p>
            <form id="hospitalForm" class="hospital-form">
                <div>
                    <label for="hospitalIdInput">Hospital ID</label>
                    <input id="hospitalIdInput" type="text" placeholder="HOSP-001" required>
                </div>
                <div>
                    <label for="hospitalNameInput">Hospital Name</label>
                    <input id="hospitalNameInput" type="text" placeholder="City General" required>
                </div>
                <div>
                    <label for="hospitalLocationInput">Location (optional)</label>
                    <input id="hospitalLocationInput" type="text" placeholder="Colombo">
                </div>
                <button class="primary" type="submit">Add Hospital</button>
            </form>
        </section>

        <div class="actions">
            <button class="primary" id="backToLoginBtn" type="button">Back to Login</button>
            <button class="secondary" id="clearSessionBtn" type="button">Clear Session</button>
        </div>
    </main>

    <script>
        const API_BASE = 'http://localhost:3000/api/auth';
        const statusMessage = document.getElementById('statusMessage');
        const requestList = document.getElementById('requestList');
        const hospitalForm = document.getElementById('hospitalForm');
        const storedRole = localStorage.getItem('auth_role') || '';

        const setStatus = (text, type) => {
            statusMessage.className = `status ${type || ''}`;
            statusMessage.textContent = text || '';
        };

        const escapeHtml = (unsafe) =>
            String(unsafe)
                .replaceAll('&', '&amp;')
                .replaceAll('<', '&lt;')
                .replaceAll('>', '&gt;')
                .replaceAll('"', '&quot;')
                .replaceAll("'", '&#039;');

        const renderRequests = (requests) => {
            if (!requests.length) {
                requestList.innerHTML = '<div class="request-item"><div class="request-meta">No pending doctor requests.</div></div>';
                return;
            }

            requestList.innerHTML = requests.map((request) => `
                <article class="request-item">
                    <div class="request-meta">
                        <strong>${escapeHtml(request.name || 'Unknown')}</strong><br>
                        Doctor ID: ${escapeHtml(request.doctor_id)}<br>
                        Email: ${escapeHtml(request.email || '')}<br>
                        Hospital ID: ${escapeHtml(request.hospital_id || '')}
                    </div>
                    <div class="request-actions">
                        <button class="ok" data-action="approve" data-id="${escapeHtml(request.doctor_id)}" type="button">Approve</button>
                        <button class="danger" data-action="reject" data-id="${escapeHtml(request.doctor_id)}" type="button">Reject</button>
                    </div>
                </article>
            `).join('');
        };

        const loadPendingRequests = async () => {
            setStatus('Loading pending doctor requests...', '');
            try {
                const response = await fetch(`${API_BASE}/admin/doctor-requests`);
                const data = await response.json();

                if (!response.ok) {
                    setStatus(data.message || 'Failed to load requests.', 'error');
                    return;
                }

                renderRequests(data.requests || []);
                setStatus('Pending requests loaded.', 'success');
            } catch (error) {
                setStatus('Unable to connect to server.', 'error');
            }
        };

        const updateVerification = async (doctorId, nextStatus) => {
            setStatus('Updating doctor verification...', '');
            try {
                const response = await fetch(`${API_BASE}/admin/doctor-requests/${doctorId}/verification`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ status: nextStatus })
                });
                const data = await response.json();

                if (!response.ok) {
                    setStatus(data.message || 'Failed to update verification.', 'error');
                    return;
                }

                setStatus(data.message || 'Doctor verification updated.', 'success');
                await loadPendingRequests();
            } catch (error) {
                setStatus('Unable to connect to server.', 'error');
            }
        };

        requestList.addEventListener('click', async (event) => {
            const target = event.target;
            if (!(target instanceof HTMLElement)) {
                return;
            }

            const action = target.dataset.action;
            const doctorId = target.dataset.id;
            if (!action || !doctorId) {
                return;
            }

            if (action === 'approve') {
                await updateVerification(doctorId, 'yes');
            }

            if (action === 'reject') {
                await updateVerification(doctorId, 'no');
            }
        });

        document.getElementById('refreshRequestsBtn').addEventListener('click', loadPendingRequests);

        hospitalForm.addEventListener('submit', async (event) => {
            event.preventDefault();
            setStatus('Creating hospital...', '');

            const payload = {
                hospital_id: document.getElementById('hospitalIdInput').value.trim(),
                name: document.getElementById('hospitalNameInput').value.trim(),
                location: document.getElementById('hospitalLocationInput').value.trim()
            };

            try {
                const response = await fetch(`${API_BASE}/hospitals`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await response.json();

                if (!response.ok) {
                    setStatus(data.message || 'Failed to create hospital.', 'error');
                    return;
                }

                setStatus(`Hospital ${data.hospital.hospital_id} created successfully.`, 'success');
                hospitalForm.reset();
            } catch (error) {
                setStatus('Unable to connect to server.', 'error');
            }
        });

        if (storedRole !== 'admin') {
            setStatus('Admin session not found. Please login again.', 'error');
        } else {
            loadPendingRequests();
        }

        document.getElementById('backToLoginBtn').addEventListener('click', () => {
            window.location.href = 'login.html';
        });

        document.getElementById('clearSessionBtn').addEventListener('click', () => {
            localStorage.removeItem('auth_role');
            localStorage.removeItem('auth_profile');
            window.location.href = 'login.html';
        });
    </script>
</body>
</html>
