<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doctor Page</title>
    <style>
        body { font-family: sans-serif; text-align: center; margin-top: 30px; }
        button { padding: 15px 30px; font-size: 18px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 5px; margin-bottom: 20px;}
        .finger-container { display: flex; justify-content: center; gap: 40px; margin-top: 30px; }
        .finger { padding: 20px; border-radius: 10px; background: #f4f4f4; width: 100px; }
        .finger h3 { margin: 0 0 10px 0; font-size: 18px; color: #555; }
        .finger h1 { margin: 0; font-size: 40px; color: #222; }
        .force-panel { margin-top: 25px; }
        #forceLevel { padding: 10px; font-size: 18px; width: 90px; margin-right: 10px; }
        #setForceBtn { background: #6c757d; }
        #forceStatus { margin-top: 8px; color: #333; }
    </style>
</head>
<body>

    <h2>Rehabilitation Glove Live Data</h2>
    <button id="connectBtn">Connect to Glove</button>
    
    <div class="finger-container">
        <div class="finger"><h3>Thumb</h3><h1 id="valThumb">--</h1></div>
        <div class="finger"><h3>Index</h3><h1 id="valIndex">--</h1></div>
        <div class="finger"><h3>Middle</h3><h1 id="valMiddle">--</h1></div>
        <div class="finger"><h3>Ring</h3><h1 id="valRing">--</h1></div>
        <div class="finger"><h3>Pinky</h3><h1 id="valPinky">--</h1></div>
    </div>

    <div class="force-panel">
        <h3>Motor Force Level (1-10)</h3>
        <input type="number" id="forceLevel" min="1" max="10" value="1">
        <button id="setForceBtn">Set Force Level</button>
        <button id="saveForceBtn">Save Force</button>
        <p id="forceStatus">Not sent yet.</p>
    </div>

    <button id="sendBtn">Send Finger Data</button>

    <script>
        const SERVICE_UUID = '12345678-1234-1234-1234-1234567890ab';
        const SENSOR_CHAR_UUID = '87654321-4321-4321-4321-9876543210ab';
        const MOTOR_CMD_UUID = '11111111-2222-3333-4444-555555555555';

        let device = null;
        let server = null;
        let sensorCharacteristic = null;
        let motorCmdCharacteristic = null;
        let keepAliveInterval = null;

        document.getElementById('connectBtn').addEventListener('click', async () => {
            try {
                device = await navigator.bluetooth.requestDevice({
                    filters: [{ services: [SERVICE_UUID] }]
                });

                device.addEventListener('gattserverdisconnected', onDisconnected);

                server = await device.gatt.connect();
                const service = await server.getPrimaryService(SERVICE_UUID);

                // SENSOR
                try {
                    sensorCharacteristic = await service.getCharacteristic(SENSOR_CHAR_UUID);
                } catch {
                    sensorCharacteristic = null;
                }

                // MOTOR
                motorCmdCharacteristic = await service.getCharacteristic(MOTOR_CMD_UUID);

                // 🔥 Force pairing/authentication
                await motorCmdCharacteristic.writeValueWithResponse(new Uint8Array([0]));

                // SENSOR notifications
                if (sensorCharacteristic) {
                    await sensorCharacteristic.startNotifications();

                    sensorCharacteristic.addEventListener('characteristicvaluechanged', (event) => {
                        const value = event.target.value;

                        document.getElementById('valThumb').innerText = value.getUint8(0);
                        document.getElementById('valIndex').innerText = value.getUint8(1);
                        document.getElementById('valMiddle').innerText = value.getUint8(2);
                        document.getElementById('valRing').innerText = value.getUint8(3);
                        document.getElementById('valPinky').innerText = value.getUint8(4);
                    });
                }

                // ✅ KEEP-ALIVE (VERY IMPORTANT)
                startKeepAlive();

                document.getElementById('connectBtn').innerText = "Connected!";
                document.getElementById('connectBtn').style.background = "#28a745";

                document.getElementById('forceStatus').innerText = sensorCharacteristic
                    ? 'Connected. Ready to send level.'
                    : 'Connected for motor control. Sensor unavailable.';

            } catch (error) {
                console.error(error);
                alert("Connection failed. Try again.");
            }
        });

        // 🔥 KEEP ALIVE FUNCTION
        function startKeepAlive() {
            if (keepAliveInterval) clearInterval(keepAliveInterval);

            keepAliveInterval = setInterval(async () => {
                if (motorCmdCharacteristic) {
                    try {
                        await motorCmdCharacteristic.writeValueWithoutResponse(new Uint8Array([0]));
                    } catch (e) {
                        console.warn("Keep-alive failed");
                    }
                }
            }, 3000); // every 3 seconds
        }

        // 🔥 AUTO DISCONNECT HANDLER
        function onDisconnected() {
            console.warn("BLE Disconnected");

            document.getElementById('connectBtn').innerText = "Reconnect";
            document.getElementById('connectBtn').style.background = "#dc3545";
            document.getElementById('forceStatus').innerText = "Disconnected. Reconnect.";

            if (keepAliveInterval) {
                clearInterval(keepAliveInterval);
                keepAliveInterval = null;
            }

            motorCmdCharacteristic = null;
            sensorCharacteristic = null;
        }

        async function sendForceLevel() {
            const level = parseInt(document.getElementById('forceLevel').value, 10);

            if (!motorCmdCharacteristic) {
                alert('Connect first');
                return;
            }

            try {
                await motorCmdCharacteristic.writeValueWithResponse(new Uint8Array([level]));

                document.getElementById('forceStatus').innerText = `Force ${level} applied`;

            } catch (error) {
                console.error(error);
                alert('Send failed');
            }
        }

        async function saveForceLevel() {
            const level = parseInt(document.getElementById('forceLevel').value, 10);

            try {
                await fetch('http://localhost:3000/api/forces', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ level })
                });

                document.getElementById('forceStatus').innerText = `Force ${level} saved`;

            } catch (error) {
                console.error(error);
                alert('Save failed');
            }
        }

        async function sendFingerData() {
            const parseOrZero = (id) => {
                const n = parseInt(document.getElementById(id).innerText, 10);
                return Number.isFinite(n) ? n : 0;
            };

            const data = {
                patient_id: 'patient_001',
                thumb: parseOrZero('valThumb'),
                index: parseOrZero('valIndex'),
                middle: parseOrZero('valMiddle'),
                ring: parseOrZero('valRing'),
                pinky: parseOrZero('valPinky')
            };

            try {
                await fetch('http://localhost:3000/api/data', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                alert('Data saved');

            } catch (error) {
                alert('Save failed');
            }
        }

        document.getElementById('setForceBtn').addEventListener('click', sendForceLevel);
        document.getElementById('saveForceBtn').addEventListener('click', saveForceLevel);
        document.getElementById('sendBtn').addEventListener('click', sendFingerData);

    </script>
</body>
</html>
