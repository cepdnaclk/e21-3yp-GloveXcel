<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GloveXcel — Doctor Dashboard</title>
  <meta name="description" content="GloveXcel doctor dashboard. Configure calibration, build preloaded exercises, and perform live assessments." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet" />

  <style>
    /* ═══════════════════════════════════════════════════════════════════════
       DESIGN TOKENS (Copied from patient_app.html)
    ═══════════════════════════════════════════════════════════════════════ */
    :root {
      /* Colour palette */
      --c-bg:          #f4fafa;
      --c-surface:     #ffffff;
      --c-surface-2:   #eafbfa;
      --c-border:      #dceae8;
      --c-brand:       #2563eb;
      --c-brand-hover: #1d4ed8;
      --c-brand-rgb:   37, 99, 235;
      --c-navy:        #073b5c;
      --c-ok:          #16a56a;
      --c-warn:        #d18a00;
      --c-danger:      #d94a4a;
      --c-text-main:   #073b5c;
      --c-text-muted:  #6b7c89;

      /* Spacing & layout */
      --radius:        18px;
      --radius-sm:     8px;
      --shadow:        0 18px 48px rgba(7, 59, 92, 0.12);
      --transition:    0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* ═══════════════════════════════════════════════════════════════════════
       RESET & BASE
    ═══════════════════════════════════════════════════════════════════════ */
    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 0;
      font-family: 'Inter', sans-serif;
      background:
        radial-gradient(circle at 82% 18%, rgba(8, 203, 181, 0.13), transparent 28%),
        linear-gradient(135deg, #eafbfa 0%, #f9fdfd 48%, #eff9f7 100%);
      color: var(--c-text-main);
      height: 100vh;
      overflow: hidden;
    }

    h2, h3, p { margin: 0; }

    button {
      font-family: inherit;
      cursor: pointer;
      border: none;
      transition: all var(--transition);
    }

    button:focus-visible,
    a:focus-visible {
      outline: 3px solid rgba(8, 203, 181, 0.35);
      outline-offset: 3px;
    }

    /* ═══════════════════════════════════════════════════════════════════════
       SPA SHELL LAYOUT
    ═══════════════════════════════════════════════════════════════════════ */
    .app-shell {
      display: grid;
      /* Sidebar | Main View | 3D Canvas */
      grid-template-columns: 250px minmax(0, 1fr) minmax(300px, 25vw);
      height: 100vh;
      gap: 18px;
      padding: 18px;
    }

    /* ── 1. Sidebar Navigation ─────────────────────────────────────────── */
    .sidebar {
      background: rgba(255, 255, 255, 0.92);
      border-right: 1px solid var(--c-border);
      border: 1px solid var(--c-border);
      border-radius: 26px;
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      padding: 24px 16px;
      min-width: 0;
    }

    .brand {
      font-size: 20px;
      font-weight: 700;
      color: var(--c-navy);
      margin-bottom: 34px;
      padding-left: 8px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .brand-icon {
      width: 24px;
      height: 24px;
      background: linear-gradient(135deg, var(--c-brand), var(--c-brand-hover));
      border-radius: 8px;
      box-shadow: 0 10px 22px rgba(37, 99, 235, 0.28);
    }

    .doctor-profile-chip {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      min-width: 0;
      margin: 0;
      padding: 10px;
      border-radius: 16px;
      border: 1px solid var(--c-border);
      background: #f7fcfb;
      color: inherit;
      text-align: left;
    }

    .doctor-profile-chip:hover,
    .doctor-profile-chip[aria-expanded="true"] {
      background: #eefbf9;
      border-color: rgba(37, 99, 235, 0.24);
      box-shadow: 0 12px 28px rgba(7, 59, 92, 0.08);
    }

    .doctor-profile-menu-wrap {
      position: relative;
      margin: -22px 0 28px;
    }

    .doctor-profile-avatar {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 13px;
      font-weight: 800;
      color: #ffffff;
      background: linear-gradient(135deg, var(--c-brand), var(--c-navy));
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.13);
    }

    .doctor-profile-meta {
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .doctor-profile-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--c-text-muted);
    }

    .doctor-profile-name {
      max-width: 172px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 14px;
      font-weight: 700;
      color: var(--c-navy);
    }

    .doctor-profile-caret {
      margin-left: auto;
      color: var(--c-text-muted);
      font-size: 13px;
      line-height: 1;
    }

    .doctor-profile-menu {
      position: absolute;
      top: calc(100% + 8px);
      left: 0;
      right: 0;
      z-index: 40;
      display: none;
      padding: 10px;
      border: 1px solid var(--c-border);
      border-radius: 14px;
      background: #ffffff;
      box-shadow: 0 18px 42px rgba(7, 59, 92, 0.16);
    }

    .doctor-profile-menu.open {
      display: block;
    }

    .doctor-profile-menu-name {
      color: var(--c-navy);
      font-size: 14px;
      font-weight: 800;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .doctor-profile-menu-email {
      color: var(--c-text-muted);
      font-size: 12px;
      line-height: 1.4;
      margin-top: 3px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .doctor-profile-form {
      display: grid;
      gap: 8px;
      margin-top: 10px;
    }

    .doctor-profile-form label {
      color: var(--c-text-muted);
      font-size: 11px;
      font-weight: 800;
    }

    .doctor-profile-form input {
      width: 100%;
      min-height: 38px;
      border: 1px solid var(--c-border);
      border-radius: 10px;
      padding: 8px 10px;
      color: var(--c-navy);
      background: #f8fcfb;
      font: inherit;
      font-size: 13px;
      outline: none;
    }

    .doctor-profile-form input:focus {
      border-color: rgba(37, 99, 235, 0.42);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
      background: #ffffff;
    }

    .doctor-profile-form input[readonly] {
      color: var(--c-text-muted);
      background: #f3f8f7;
    }

    .doctor-profile-save-btn {
      width: 100%;
      min-height: 38px;
      border-radius: 10px;
      color: #ffffff;
      background: var(--c-brand);
      font-size: 13px;
      font-weight: 800;
    }

    .doctor-profile-save-btn:disabled {
      cursor: not-allowed;
      opacity: 0.58;
    }

    .doctor-profile-message {
      min-height: 18px;
      color: var(--c-text-muted);
      font-size: 11px;
      line-height: 1.4;
    }

    .doctor-profile-message.ok { color: var(--c-ok); }
    .doctor-profile-message.error { color: var(--c-danger); }

    .profile-password-modal {
      position: fixed;
      inset: 0;
      z-index: 80;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
      background: rgba(7, 59, 92, 0.28);
      backdrop-filter: blur(6px);
    }

    .profile-password-modal.open {
      display: flex;
    }

    .profile-password-dialog {
      width: min(360px, 100%);
      border: 1px solid var(--c-border);
      border-radius: 18px;
      background: #ffffff;
      box-shadow: 0 24px 70px rgba(7, 59, 92, 0.22);
      padding: 20px;
    }

    .profile-password-dialog h3 {
      margin: 0 0 6px;
      color: var(--c-navy);
      font-size: 18px;
      font-weight: 900;
    }

    .profile-password-dialog p {
      margin: 0 0 14px;
      color: var(--c-text-muted);
      font-size: 13px;
      line-height: 1.5;
    }

    .profile-password-dialog label {
      color: var(--c-text-muted);
      font-size: 12px;
      font-weight: 800;
    }

    .profile-password-dialog input {
      width: 100%;
      min-height: 42px;
      margin-top: 6px;
      border: 1px solid var(--c-border);
      border-radius: 12px;
      padding: 9px 11px;
      color: var(--c-navy);
      background: #f8fcfb;
      font: inherit;
      outline: none;
    }

    .profile-password-dialog input:focus {
      border-color: rgba(37, 99, 235, 0.42);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
      background: #ffffff;
    }

    .profile-password-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 16px;
    }

    .profile-password-message {
      min-height: 18px;
      margin-top: 10px;
      color: var(--c-danger);
      font-size: 12px;
      line-height: 1.4;
    }

    .doctor-profile-menu-divider {
      height: 1px;
      margin: 10px 0;
      background: var(--c-border);
    }

    .doctor-logout-btn {
      width: 100%;
      padding: 10px 12px;
      border-radius: 10px;
      background: rgba(217, 74, 74, 0.08);
      color: var(--c-danger);
      font-size: 13px;
      font-weight: 800;
      text-align: left;
    }

    .doctor-logout-btn:hover {
      background: rgba(217, 74, 74, 0.14);
    }

    .nav-menu {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .nav-btn {
      text-align: left;
      padding: 12px 16px;
      background: transparent;
      color: var(--c-text-muted);
      border-radius: 14px;
      font-size: 14px;
      font-weight: 500;
      border: 1px solid transparent;
    }

    .nav-btn:hover {
      background: #eefbf9;
      color: var(--c-navy);
    }

    .nav-btn.active {
      background: var(--c-brand);
      color: #ffffff;
      border-color: transparent;
      box-shadow: 0 12px 24px rgba(37, 99, 235, 0.26);
    }

    .sidebar-refresh-btn {
      margin-top: auto;
      width: 100%;
      border: 1px solid var(--c-border);
      border-radius: 14px;
      background: #ffffff;
      color: var(--c-navy);
      font-size: 14px;
      font-weight: 700;
      padding: 12px 16px;
      text-align: center;
      box-shadow: none;
    }

    .sidebar-refresh-btn:hover {
      background: #eefbf9;
      color: var(--c-navy);
    }

    .sidebar-footer {
      margin-top: auto;
      font-size: 12px;
      color: var(--c-text-muted);
      padding: 0 8px;
    }

    /* ── 2. Dynamic View Container ─────────────────────────────────────── */
    .view-wrapper {
      position: relative;
      background: transparent;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    #view-container {
      flex: 1;
      padding: 0;
      max-width: 1180px;
      margin: 0 auto;
      width: 100%;
    }

    /* ── 3. Persistent 3D Canvas ───────────────────────────────────────── */
    .canvas-wrapper {
      background:
        radial-gradient(circle at 50% 18%, rgba(37, 99, 235, 0.14), transparent 36%),
        linear-gradient(180deg, rgba(255, 255, 255, 0.94), rgba(239, 251, 248, 0.9));
      border: 1px solid rgba(220, 234, 232, 0.95);
      border-radius: 28px;
      box-shadow: var(--shadow);
      position: relative;
      display: flex;
      flex-direction: column;
      min-height: 0;
      overflow: hidden;
      backdrop-filter: blur(16px);
    }

    .canvas-panel-bar {
      min-height: 58px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 18px;
      border-bottom: 1px solid var(--c-border);
      background: rgba(255, 255, 255, 0.62);
      flex-shrink: 0;
      position: relative;
      z-index: 2;
    }

    .canvas-panel-bar .panel-label {
      color: var(--c-navy);
      font-size: 13px;
      font-weight: 900;
    }

    #doctorRendererContainer {
      flex: 1;
      width: 100%;
      min-height: 320px;
      position: relative;
      z-index: 0;
    }

    #doctorRendererContainer canvas {
      display: block;
      width: 100% !important;
      height: 100% !important;
      border-radius: 0 0 28px 28px;
    }

    .canvas-overlay-status {
      font-size: 13px;
      font-weight: 400;
      color: var(--c-text-muted);
      white-space: nowrap;
      pointer-events: none;
      position: static;
      transform: none;
      background: transparent;
      border: 0;
      padding: 0;
    }

    /* ═══════════════════════════════════════════════════════════════════════
       GLOBAL COMPONENT STYLES (Used by view fragments)
    ═══════════════════════════════════════════════════════════════════════ */
    .view-header {
      margin-bottom: 32px;
    }

    .view-title {
      font-size: 28px;
      font-weight: 700;
      color: var(--c-navy);
      margin-bottom: 8px;
    }

    .view-subtitle {
      font-size: 14px;
      color: var(--c-text-muted);
    }

    .status-bar {
      background: var(--c-surface);
      border: 1px solid var(--c-border);
      border-radius: var(--radius);
      padding: 16px 20px;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      box-shadow: var(--shadow);
    }

    .status-indicator {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--c-text-muted);
    }
    .status-indicator.online { background: var(--c-ok); box-shadow: 0 0 8px rgba(40, 167, 69, 0.6); }

    .status-text {
      font-size: 14px;
      font-weight: 500;
      flex: 1;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--c-brand), var(--c-brand-hover));
      color: #fff;
      padding: 10px 20px;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 600;
      box-shadow: 0 12px 28px rgba(37, 99, 235, 0.26);
    }
    .btn-primary:hover:not(:disabled) {
      background: linear-gradient(135deg, var(--c-brand-hover), #1e40af);
      box-shadow: 0 18px 34px rgba(37, 99, 235, 0.3);
      transform: translateY(-1px);
    }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-secondary {
      background: transparent;
      color: var(--c-text-main);
      border: 1px solid var(--c-border);
      padding: 10px 20px;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 500;
    }
    .btn-secondary:hover:not(:disabled) { background: var(--c-surface-2); color: var(--c-navy); }
    .btn-secondary:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-success {
      background: linear-gradient(135deg, var(--c-brand), var(--c-brand-hover));
      color: #fff;
      padding: 10px 20px;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 600;
    }
    .btn-success:hover:not(:disabled) {
      background: linear-gradient(135deg, var(--c-brand-hover), #1e40af);
      box-shadow: 0 18px 34px rgba(37, 99, 235, 0.3);
      transform: translateY(-1px);
    }
    .btn-success:disabled { opacity: 0.5; cursor: not-allowed; }

    .panel {
      background: var(--c-surface);
      border: 1px solid var(--c-border);
      border-radius: var(--radius);
      padding: 24px;
      margin-bottom: 24px;
      box-shadow: var(--shadow);
    }

    .panel-title {
      font-size: 16px;
      font-weight: 600;
      color: var(--c-navy);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* Calibration Amber Warning Banner */
    .calib-warning-banner {
      background: rgba(209, 138, 0, 0.1);
      border: 1px solid rgba(209, 138, 0, 0.3);
      border-radius: var(--radius-sm);
      padding: 16px;
      margin-bottom: 24px;
      display: flex;
      gap: 16px;
      align-items: flex-start;
      animation: slideIn 0.3s ease-out;
    }

    .calib-warning-icon {
      font-size: 20px;
      line-height: 1;
    }

    .calib-warning-body {
      flex: 1;
      font-size: 13px;
      line-height: 1.5;
      color: #e2e8f0;
    }

    .calib-warning-body strong {
      display: block;
      color: #fbd38d;
      font-size: 14px;
      margin-bottom: 4px;
    }

    .calib-warning-link {
      background: none;
      border: none;
      padding: 0;
      color: #f6ad55;
      font-size: 13px;
      font-weight: 600;
      margin-top: 8px;
      cursor: pointer;
    }

    .calib-warning-link:hover { text-decoration: underline; }

    .calib-warning-dismiss {
      background: none;
      border: none;
      color: var(--c-text-muted);
      cursor: pointer;
      padding: 4px;
      border-radius: 4px;
    }

    .calib-warning-dismiss:hover { background: rgba(255,255,255,0.1); color: #fff; }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Router Error Fallback */
    .view-error {
      background: rgba(220, 38, 38, 0.1);
      border: 1px solid rgba(220, 38, 38, 0.3);
      border-radius: var(--radius);
      padding: 24px;
      color: #fca5a5;
    }

    .mobile-shell-bar,
    #sidebarToggle {
      display: none;
    }

    @media (max-width: 1180px) {
      .app-shell {
        grid-template-columns: 230px minmax(0, 1fr);
        grid-template-rows: minmax(0, 1fr) 330px;
      }

      .canvas-wrapper {
        grid-column: 2;
      }
    }

    @media (max-width: 860px) {
      body {
        height: auto;
        min-height: 100vh;
        overflow: auto;
      }

      .app-shell {
        display: block;
        min-height: 100vh;
        padding: 76px 14px 14px;
      }

      .mobile-shell-bar {
        position: fixed;
        top: 12px;
        left: 12px;
        right: 12px;
        z-index: 30;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        min-height: 52px;
        padding: 10px 12px;
        border-radius: 18px;
        border: 1px solid var(--c-border);
        background: rgba(255, 255, 255, 0.94);
        box-shadow: var(--shadow);
      }

      .mobile-menu-btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 40px;
        height: 40px;
        border-radius: 12px;
        border: 1px solid var(--c-border);
        color: var(--c-navy);
        background: #ffffff;
        font-size: 22px;
        line-height: 1;
        cursor: pointer;
      }

      .mobile-brand {
        font-size: 15px;
        font-weight: 800;
        color: var(--c-navy);
      }

      .sidebar {
        position: fixed;
        top: 76px;
        bottom: 14px;
        left: 14px;
        z-index: 25;
        width: min(82vw, 300px);
        transform: translateX(calc(-100% - 28px));
        transition: transform var(--transition);
      }

      #sidebarToggle:checked ~ .app-shell .sidebar {
        transform: translateX(0);
      }

      .view-wrapper {
        overflow: visible;
      }

      .canvas-wrapper {
        height: 330px;
        margin-top: 18px;
      }
    }

  </style>

  <!-- Import Map for Three.js (Must be present before module scripts) -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.164.1/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.164.1/examples/jsm/"
    }
  }
  </script>
  <script src="./js/mqtt.min.js"></script>
</head>
<body>

  <input type="checkbox" id="sidebarToggle" aria-label="Toggle doctor navigation" />
  <div class="mobile-shell-bar">
    <label class="mobile-menu-btn" for="sidebarToggle" aria-label="Toggle doctor navigation">☰</label>
    <span class="mobile-brand">GloveXcel Doctor Dashboard</span>
  </div>

  <div class="app-shell">
    
    <!-- ── 1. Sidebar ───────────────────────────────────────────────────── -->
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-icon"></div>
        Doctor Dashboard
      </div>

      <div class="doctor-profile-menu-wrap">
        <button
          class="doctor-profile-chip"
          id="doctorProfileChip"
          type="button"
          title="Logged-in doctor"
          aria-haspopup="menu"
          aria-expanded="false"
          aria-controls="doctorProfileMenu"
        >
          <span class="doctor-profile-avatar" id="doctorProfileAvatar" aria-hidden="true">D</span>
          <span class="doctor-profile-meta">
            <span class="doctor-profile-label">Doctor</span>
            <span class="doctor-profile-name" id="doctorProfileName">Doctor</span>
          </span>
          <span class="doctor-profile-caret" aria-hidden="true">▾</span>
        </button>
        <div class="doctor-profile-menu" id="doctorProfileMenu" role="menu">
          <div class="doctor-profile-menu-name" id="doctorProfileMenuName">Doctor</div>
          <div class="doctor-profile-menu-email" id="doctorProfileMenuEmail">doctor</div>
          <form class="doctor-profile-form" id="doctorProfileForm">
            <label for="doctorProfileEditName">Name</label>
            <input id="doctorProfileEditName" type="text" autocomplete="name" required>

            <label for="doctorProfileEditEmail">Email</label>
            <input id="doctorProfileEditEmail" type="email" readonly>

            <label for="doctorProfileEditPhone">Phone</label>
            <input id="doctorProfileEditPhone" type="tel" autocomplete="tel" required>

            <button class="doctor-profile-save-btn hidden" id="doctorProfileSaveBtn" type="submit">
              Save Edited Details
            </button>
            <div class="doctor-profile-message" id="doctorProfileMessage"></div>
          </form>
          <div class="doctor-profile-menu-divider"></div>
          <button class="doctor-logout-btn" id="doctorLogoutBtn" type="button" role="menuitem">
            Logout
          </button>
        </div>
      </div>

      <nav class="nav-menu" aria-label="Main navigation">
        <button class="nav-btn" data-route="doctor-setup">Setup & Calibration</button>
        <button class="nav-btn" data-route="doctor-patients">Patients</button>
        <button class="nav-btn" data-route="doctor-preloaded">Exercise Builder</button>
        <button class="nav-btn" data-route="doctor-live">Live Assessment</button>
        <button class="nav-btn" data-route="doctor-progress">Patient Progress</button>
      </nav>

      <button class="sidebar-refresh-btn" id="doctorSidebarRefreshBtn" type="button">
        Refresh
      </button>

    </aside>

    <!-- ── 2. View Container (Dynamic) ──────────────────────────────────── -->
    <main class="view-wrapper">
      <div id="view-container" aria-live="polite">
        <!-- Route fragments injected here by router.js -->
      </div>
    </main>

    <!-- ── 3. Persistent 3D Canvas ──────────────────────────────────────── -->
    <aside class="canvas-wrapper">
      <div class="canvas-panel-bar">
        <span class="panel-label">3D Digital Twin</span>
        <span id="modelStatus" class="canvas-overlay-status">Model loading...</span>
      </div>
      <div id="doctorRendererContainer"></div>
    </aside>

  </div>

  <div class="profile-password-modal" id="doctorPasswordModal" aria-hidden="true">
    <form class="profile-password-dialog" id="doctorPasswordForm">
      <h3>Confirm Password</h3>
      <p>Enter your password to save the profile changes.</p>
      <label for="doctorProfilePasswordConfirm">Password</label>
      <input id="doctorProfilePasswordConfirm" type="password" autocomplete="current-password" required>
      <div class="profile-password-message" id="doctorPasswordMessage"></div>
      <div class="profile-password-actions">
        <button class="btn-secondary" id="doctorPasswordCancelBtn" type="button">Cancel</button>
        <button class="btn-primary" id="doctorPasswordConfirmBtn" type="submit">Save</button>
      </div>
    </form>
  </div>

  <!-- ── 4. SPA Bootstrapper ────────────────────────────────────────────── -->
  <script type="module">
    import { GloveState } from './js/gloveState.js';
    import { ThreeEngine } from './js/threeEngine.js';
    import { createRouter } from './js/router.js';

    function decodeJwtPayload(token) {
      try {
        const payload = token.split('.')[1];
        if (!payload) return null;
        const base64 = payload.replace(/-/g, '+').replace(/_/g, '/');
        const padded = base64.padEnd(base64.length + ((4 - (base64.length % 4)) % 4), '=');
        return JSON.parse(atob(padded));
      } catch {
        return null;
      }
    }

    function getDoctorSession() {
      const role = String(localStorage.getItem('auth_role') || '').trim().toLowerCase();
      const token = localStorage.getItem('auth_token') || '';
      let tokenPayload = token ? decodeJwtPayload(token) : null;
      if (tokenPayload?.exp && tokenPayload.exp * 1000 <= Date.now()) {
        localStorage.removeItem('auth_token');
        tokenPayload = null;
      }
      const tokenRole = String(tokenPayload?.role || '').trim().toLowerCase();
      const tokenDoctorId = tokenRole === 'doctor' ? String(tokenPayload?.sub || '').trim() : '';
      const storedDoctorId = String(localStorage.getItem('doctorId') || '').trim();
      let profile = null;

      try {
        profile = JSON.parse(localStorage.getItem('auth_profile') || 'null');
      } catch {
        profile = null;
      }

      const profileDoctorId = String(profile?.doctor_id || '').trim();
      const doctorId = profileDoctorId || tokenDoctorId || storedDoctorId;
      const hasDoctorSession = role === 'doctor' || tokenRole === 'doctor' || (!role && Boolean(doctorId));

      if (!hasDoctorSession || !doctorId) {
        return null;
      }

      profile = {
        ...(profile || {}),
        doctor_id: doctorId,
        name: profile?.name || tokenPayload?.name || profile?.email || 'Doctor',
        email: profile?.email || tokenPayload?.email || ''
      };

      localStorage.setItem('auth_role', 'doctor');
      localStorage.setItem('auth_profile', JSON.stringify(profile));
      localStorage.setItem('doctorId', doctorId);

      return profile;
    }

    function getInitials(name) {
      const parts = String(name || 'Doctor').trim().split(/\s+/).filter(Boolean);
      const initials = parts.slice(0, 2).map(part => part[0]).join('');
      return initials.toUpperCase() || 'D';
    }

    function getGreetingText() {
      const hour = new Date().getHours();
      if (hour < 12) return 'Good morning';
      if (hour < 17) return 'Good afternoon';
      return 'Good evening';
    }

    function renderDoctorProfile(profile) {
      const doctorName = profile.name || profile.email || profile.doctor_id || 'Doctor';
      const profileNameEl = document.getElementById('doctorProfileName');
      const profileMenuNameEl = document.getElementById('doctorProfileMenuName');
      const profileMenuEmailEl = document.getElementById('doctorProfileMenuEmail');
      const profileAvatarEl = document.getElementById('doctorProfileAvatar');
      const profileChipEl = document.getElementById('doctorProfileChip');
      const editNameEl = document.getElementById('doctorProfileEditName');
      const editEmailEl = document.getElementById('doctorProfileEditEmail');
      const editPhoneEl = document.getElementById('doctorProfileEditPhone');
      const greetingTextEl = document.getElementById('doctorGreetingText');
      const greetingMetaEl = document.getElementById('doctorGreetingMeta');

      if (profileNameEl) profileNameEl.textContent = doctorName;
      if (profileMenuNameEl) profileMenuNameEl.textContent = doctorName;
      if (profileMenuEmailEl) {
        const phone = profile.phone ? ` | ${profile.phone}` : ' | Phone not added';
        profileMenuEmailEl.textContent = `${profile.email || profile.doctor_id || ''}${phone}`;
      }
      if (profileAvatarEl) profileAvatarEl.textContent = getInitials(doctorName);
      if (profileChipEl) {
        profileChipEl.title = `${doctorName} (${profile.doctor_id})`;
      }
      if (editNameEl) editNameEl.value = profile.name || '';
      if (editEmailEl) editEmailEl.value = profile.email || '';
      if (editPhoneEl) editPhoneEl.value = profile.phone || '';
      window.dispatchEvent(new CustomEvent('doctor-profile:rendered'));
      if (greetingTextEl) greetingTextEl.textContent = `${getGreetingText()}, ${doctorName}`;
      if (greetingMetaEl) {
        greetingMetaEl.textContent = 'Ready to manage today\'s rehabilitation sessions.';
      }

      localStorage.setItem('doctorId', profile.doctor_id);
    }

    function saveDoctorProfileToSession(profile) {
      localStorage.setItem('auth_profile', JSON.stringify(profile));
      localStorage.setItem('doctorId', profile.doctor_id);
      renderDoctorProfile(profile);
    }

    async function refreshDoctorProfile() {
      try {
        const response = await fetch(`${GloveState.apiBase}/api/auth/doctor/profile`, {
          headers: GloveState.getAuthHeaders()
        });

        if (!response.ok) return;

        const data = await response.json();
        if (data.profile) {
          saveDoctorProfileToSession(data.profile);
        }
      } catch (error) {
        console.warn('[DoctorApp] Failed to refresh doctor profile:', error);
      }
    }

    function setDoctorProfileMessage(text, type = '') {
      const messageEl = document.getElementById('doctorProfileMessage');
      if (!messageEl) return;
      messageEl.className = `doctor-profile-message ${type}`;
      messageEl.textContent = text || '';
    }

    function logoutDoctor() {
      [
        'auth_token',
        'auth_role',
        'auth_profile',
        'doctorId',
        'doctorSelectedPatient'
      ].forEach((key) => localStorage.removeItem(key));

      window.location.replace('./login.html');
    }

    function bindDoctorProfileMenu() {
      const profileChipEl = document.getElementById('doctorProfileChip');
      const profileMenuEl = document.getElementById('doctorProfileMenu');
      const logoutBtn = document.getElementById('doctorLogoutBtn');
      const profileForm = document.getElementById('doctorProfileForm');
      const saveBtn = document.getElementById('doctorProfileSaveBtn');
      const nameInput = document.getElementById('doctorProfileEditName');
      const phoneInput = document.getElementById('doctorProfileEditPhone');
      const passwordModal = document.getElementById('doctorPasswordModal');
      const passwordForm = document.getElementById('doctorPasswordForm');
      const passwordInput = document.getElementById('doctorProfilePasswordConfirm');
      const passwordMessage = document.getElementById('doctorPasswordMessage');
      const passwordCancelBtn = document.getElementById('doctorPasswordCancelBtn');
      const passwordConfirmBtn = document.getElementById('doctorPasswordConfirmBtn');
      let pendingProfileUpdate = null;

      if (!profileChipEl || !profileMenuEl) return;

      const setMenuOpen = (isOpen) => {
        profileMenuEl.classList.toggle('open', isOpen);
        profileChipEl.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
      };

      const setPasswordModalOpen = (isOpen) => {
        passwordModal?.classList.toggle('open', isOpen);
        passwordModal?.setAttribute('aria-hidden', isOpen ? 'false' : 'true');
        if (passwordMessage) passwordMessage.textContent = '';
        if (isOpen) {
          passwordInput?.focus();
        } else if (passwordInput) {
          passwordInput.value = '';
        }
      };

      const getStoredProfile = () => {
        try {
          return JSON.parse(localStorage.getItem('auth_profile') || '{}') || {};
        } catch {
          return {};
        }
      };

      const updateProfileSaveVisibility = () => {
        const storedProfile = getStoredProfile();
        const changed = (nameInput?.value.trim() || '') !== String(storedProfile.name || '').trim()
          || (phoneInput?.value.trim() || '') !== String(storedProfile.phone || '').trim();
        saveBtn?.classList.toggle('hidden', !changed);
      };

      profileChipEl.addEventListener('click', (event) => {
        event.stopPropagation();
        setMenuOpen(!profileMenuEl.classList.contains('open'));
      });

      profileMenuEl.addEventListener('click', (event) => {
        event.stopPropagation();
      });

      nameInput?.addEventListener('input', updateProfileSaveVisibility);
      phoneInput?.addEventListener('input', updateProfileSaveVisibility);
      window.addEventListener('doctor-profile:rendered', updateProfileSaveVisibility);
      updateProfileSaveVisibility();

      profileForm?.addEventListener('submit', async (event) => {
        event.preventDefault();
        const name = document.getElementById('doctorProfileEditName')?.value.trim() || '';
        const phone = document.getElementById('doctorProfileEditPhone')?.value.trim() || '';

        if (!name || !phone) {
          setDoctorProfileMessage('Name and phone are required.', 'error');
          return;
        }

        pendingProfileUpdate = { name, phone };
        setDoctorProfileMessage('');
        setPasswordModalOpen(true);
      });

      passwordForm?.addEventListener('submit', async (event) => {
        event.preventDefault();
        if (!pendingProfileUpdate) {
          setPasswordModalOpen(false);
          return;
        }

        const password = passwordInput?.value || '';
        if (!password) {
          if (passwordMessage) passwordMessage.textContent = 'Password is required.';
          return;
        }

        if (saveBtn) {
          saveBtn.disabled = true;
          saveBtn.textContent = 'Saving...';
        }
        if (passwordConfirmBtn) {
          passwordConfirmBtn.disabled = true;
          passwordConfirmBtn.textContent = 'Saving...';
        }
        setDoctorProfileMessage('Saving contact details...');
        if (passwordMessage) passwordMessage.textContent = '';

        try {
          const response = await fetch(`${GloveState.apiBase}/api/auth/doctor/profile`, {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json', ...GloveState.getAuthHeaders() },
            body: JSON.stringify({ ...pendingProfileUpdate, password })
          });
          const data = await response.json().catch(() => ({}));

          if (!response.ok) {
            throw new Error(data.message || 'Failed to update profile.');
          }

          if (data.profile) {
            saveDoctorProfileToSession(data.profile);
          }
          pendingProfileUpdate = null;
          setPasswordModalOpen(false);
          setDoctorProfileMessage('Contact details saved.', 'ok');
        } catch (error) {
          if (passwordMessage) passwordMessage.textContent = error.message || 'Failed to update profile.';
          setDoctorProfileMessage('Profile was not saved.', 'error');
        } finally {
          if (saveBtn) {
            saveBtn.disabled = false;
            saveBtn.textContent = 'Save Edited Details';
          }
          if (passwordConfirmBtn) {
            passwordConfirmBtn.disabled = false;
            passwordConfirmBtn.textContent = 'Save';
          }
        }
      });

      passwordCancelBtn?.addEventListener('click', () => {
        pendingProfileUpdate = null;
        setPasswordModalOpen(false);
      });

      passwordModal?.addEventListener('click', (event) => {
        if (event.target === passwordModal) {
          pendingProfileUpdate = null;
          setPasswordModalOpen(false);
        }
      });

      logoutBtn?.addEventListener('click', logoutDoctor);

      document.addEventListener('click', () => setMenuOpen(false));
      document.addEventListener('keydown', (event) => {
        if (event.key === 'Escape') {
          setMenuOpen(false);
          pendingProfileUpdate = null;
          setPasswordModalOpen(false);
        }
      });
    }

    function bootstrapDoctorApp() {
      const doctorProfile = getDoctorSession();
      if (!doctorProfile) {
        window.location.replace('./login.html');
        return;
      }
      renderDoctorProfile(doctorProfile);
      bindDoctorProfileMenu();
      refreshDoctorProfile();

      // 1. Initialize Singletons
      const viewContainer = document.getElementById('view-container');
      const canvasContainer = document.getElementById('doctorRendererContainer');
      const modelStatusEl = document.getElementById('modelStatus');

      ThreeEngine.init(canvasContainer);
      ThreeEngine.onModelStatus = (msg) => {
        if (modelStatusEl) {
          modelStatusEl.textContent = msg;
          modelStatusEl.style.opacity = '1';
        }
      };

      // 2. Initialize Router
      const router = createRouter(viewContainer, GloveState, ThreeEngine, 'doctor-setup');

      // 3. Bind Navigation Buttons
      document.querySelectorAll('.nav-btn[data-route]').forEach(btn => {
        btn.addEventListener('click', (e) => {
          router.go(e.target.dataset.route);
        });
      });

      document.getElementById('doctorSidebarRefreshBtn')?.addEventListener('click', () => {
        const route = window.location.hash.replace(/^#\/?/, '').trim() || 'doctor-setup';
        router.go(route);
      });

      // 4. Start Routing
      // Provide a fallback hash if none exists so it boots cleanly to calibration/setup
      if (!window.location.hash || window.location.hash === '#') {
        window.location.hash = '#doctor-setup';
      }
      router.initial();
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', bootstrapDoctorApp, { once: true });
    } else {
      bootstrapDoctorApp();
    }
  </script>
</body>
</html>
