<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GloveXcel Access Portal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --page-bg: #090d1a;
            --brand: #2563eb;
            --brand-dark: #1d4ed8;
            --brand-soft: #eaf1ff;
            --ink: #111827;
            --muted: #6b7280;
            --line: #e5e7eb;
            --field: #f8fafc;
            --danger: #dc2626;
            --ok: #16a34a;
            --radius-card: 34px;
            --radius-panel: 28px;
            --shadow: 0 30px 90px rgba(3, 7, 18, 0.38);
            --trans: 0.18s ease;
            --auth-visual-image: url("./Assets/patient-consulting-doctor.jpg");
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Inter", "Segoe UI", Tahoma, sans-serif;
            color: var(--ink);
            background:
                radial-gradient(circle at 18% 16%, rgba(102, 126, 234, 0.38), transparent 32%),
                radial-gradient(circle at 78% 20%, rgba(67, 56, 202, 0.24), transparent 28%),
                radial-gradient(circle at 48% 86%, rgba(14, 165, 233, 0.16), transparent 36%),
                linear-gradient(135deg, #050816 0%, #0b1020 48%, #111827 100%);
            display: grid;
            place-items: center;
            padding: 28px;
            overflow-x: hidden;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
            background:
                radial-gradient(circle at 35% 28%, rgba(255, 255, 255, 0.08), transparent 24%),
                linear-gradient(rgba(255, 255, 255, 0.035) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.035) 1px, transparent 1px);
            background-size: auto, 54px 54px, 54px 54px;
            mask-image: linear-gradient(to bottom, rgba(0, 0, 0, 0.78), transparent 82%);
        }

        button,
        input,
        select {
            font: inherit;
        }

        .auth-shell {
            position: relative;
            z-index: 1;
            width: min(1120px, 100%);
            height: min(720px, calc(100vh - 56px));
            min-height: 640px;
            display: grid;
            grid-template-columns: minmax(420px, 1.02fr) minmax(390px, 0.98fr);
            overflow: hidden;
            background: #fff;
            border: 1px solid rgba(255, 255, 255, 0.68);
            border-radius: var(--radius-card);
            box-shadow: var(--shadow);
        }

        .auth-info {
            position: relative;
            min-height: 0;
            padding: 34px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            overflow: hidden;
            isolation: isolate;
            color: #fff;
            background:
                linear-gradient(180deg, rgba(4, 16, 39, 0.08) 0%, rgba(7, 18, 41, 0.76) 78%),
                var(--auth-visual-image) center / cover no-repeat;
            border-top-left-radius: var(--radius-card);
            border-bottom-left-radius: var(--radius-card);
            border-bottom-right-radius: 86px;
        }

        .auth-info::after {
            content: "";
            position: absolute;
            inset: auto 0 0 0;
            height: 48%;
            z-index: 0;
            background: linear-gradient(180deg, transparent 0%, rgba(5, 13, 31, 0.88) 100%);
        }

        .visual-brand,
        .visual-copy {
            position: relative;
            z-index: 1;
        }

        .visual-brand {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            width: max-content;
            padding: 9px 12px;
            color: #0f2f57;
            background: rgba(255, 255, 255, 0.76);
            border: 1px solid rgba(255, 255, 255, 0.72);
            border-radius: 999px;
            box-shadow: 0 16px 35px rgba(15, 23, 42, 0.12);
            backdrop-filter: blur(10px);
            font-weight: 800;
            letter-spacing: -0.02em;
        }

        .visual-brand-mark {
            width: 22px;
            height: 22px;
            border-radius: 7px;
            background: linear-gradient(135deg, #023e70, #08a7b9);
            box-shadow: 0 8px 18px rgba(8, 167, 185, 0.32);
        }

        .visual-copy {
            max-width: 390px;
        }

        .visual-copy h1 {
            margin: 0;
            color: #fff;
            font-size: clamp(2rem, 4.2vw, 3.45rem);
            line-height: 1.02;
            letter-spacing: -0.055em;
        }

        .visual-copy p {
            margin: 16px 0 0;
            color: rgba(255, 255, 255, 0.78);
            font-size: 14px;
            line-height: 1.65;
        }

        .auth-panel {
            min-height: 0;
            height: 100%;
            padding: 56px clamp(34px, 5vw, 64px);
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            background: #fff;
            overflow-y: auto;
            scrollbar-gutter: stable;
        }

        .auth-panel::-webkit-scrollbar {
            width: 8px;
        }

        .auth-panel::-webkit-scrollbar-track {
            background: transparent;
        }

        .auth-panel::-webkit-scrollbar-thumb {
            background: #dbe3ef;
            border-radius: 999px;
        }

        .switch-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-bottom: 30px;
            padding: 5px;
            background: #f3f4f6;
            border: 1px solid #edf0f4;
            border-radius: 999px;
        }

        .switch-btn {
            border: 1px solid transparent;
            background: transparent;
            color: #6b7280;
            padding: 11px 13px;
            border-radius: 999px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            transition: var(--trans);
        }

        .switch-btn:hover {
            color: var(--ink);
            background: #fff;
        }

        .switch-btn.active {
            border-color: rgba(37, 99, 235, 0.18);
            background: var(--brand);
            color: #fff;
            box-shadow: 0 12px 28px rgba(37, 99, 235, 0.26);
        }

        .form-title {
            margin: 0;
            color: var(--ink);
            font-size: clamp(1.8rem, 3vw, 2.55rem);
            line-height: 1.06;
            letter-spacing: -0.055em;
        }

        .form-subtitle {
            margin: 10px 0 28px;
            color: var(--muted);
            font-size: 14px;
            line-height: 1.55;
        }

        .auth-form {
            display: grid;
            gap: 10px;
        }

        label {
            color: #374151;
            font-size: 13px;
            font-weight: 700;
        }

        input,
        select {
            width: 100%;
            border: 1px solid #dfe5ee;
            border-radius: 14px;
            padding: 13px 14px;
            color: var(--ink);
            background: var(--field);
            outline: none;
            transition: var(--trans);
        }

        input::placeholder {
            color: #a3aab7;
        }

        input:focus,
        select:focus {
            border-color: var(--brand);
            background: #fff;
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.11);
        }

        select {
            color-scheme: light;
        }

        .submit-btn {
            margin-top: 12px;
            border: none;
            border-radius: 16px;
            padding: 14px 16px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--brand), var(--brand-dark));
            color: #fff;
            cursor: pointer;
            transition: var(--trans);
            box-shadow: 0 18px 34px rgba(37, 99, 235, 0.24);
        }

        .submit-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 22px 42px rgba(37, 99, 235, 0.3);
        }

        .auth-divider {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            gap: 14px;
            margin: 22px 0 16px;
            color: #9ca3af;
            font-size: 12px;
            font-weight: 700;
            text-transform: lowercase;
        }

        .auth-divider::before,
        .auth-divider::after {
            content: "";
            height: 1px;
            background: var(--line);
        }

        .secondary-auth-btn {
            width: 100%;
            border: 1px solid #dfe5ee;
            border-radius: 16px;
            padding: 13px 16px;
            color: #1f2937;
            background: #fff;
            font-weight: 700;
            cursor: pointer;
            transition: var(--trans);
        }

        .secondary-auth-btn:hover {
            border-color: #cbd5e1;
            background: #f8fafc;
        }

        .secondary-auth-btn:disabled {
            cursor: not-allowed;
            opacity: 0.68;
        }

        .google-mark {
            display: inline-grid;
            width: 20px;
            height: 20px;
            margin-right: 10px;
            place-items: center;
            border-radius: 50%;
            color: #fff;
            background: conic-gradient(from -45deg, #4285f4 0 25%, #34a853 0 50%, #fbbc05 0 75%, #ea4335 0);
            font-size: 12px;
            font-weight: 800;
            vertical-align: -3px;
        }

        .toggle-mode {
            margin-top: 22px;
            text-align: center;
            color: var(--muted);
            font-size: 14px;
        }

        .toggle-mode button {
            border: none;
            background: transparent;
            color: var(--brand);
            font-weight: 700;
            cursor: pointer;
            padding: 4px 2px;
        }

        .message {
            min-height: 22px;
            margin-top: 14px;
            color: var(--muted);
            font-size: 13px;
            font-weight: 600;
            text-align: center;
        }

        .message.error { color: var(--danger); }
        .message.success { color: var(--ok); }

        .hidden {
            display: none;
        }

        @media (max-width: 940px) {
            body {
                padding: 18px;
                place-items: start center;
            }

            .auth-shell {
                grid-template-columns: 1fr;
                height: auto;
                min-height: auto;
                border-radius: 28px;
            }

            .auth-info {
                min-height: 420px;
                border-radius: 28px 28px 70px 28px;
                background-position: center;
            }

            .auth-panel {
                height: auto;
                min-height: 620px;
                overflow: visible;
                padding: 36px 28px 34px;
            }
        }

        @media (max-width: 560px) {
            body {
                padding: 12px;
            }

            .auth-shell {
                border-radius: 22px;
            }

            .auth-info {
                min-height: 350px;
                padding: 22px;
                border-radius: 22px 22px 54px 22px;
            }

            .switch-row {
                grid-template-columns: 1fr;
                border-radius: 20px;
            }

            .auth-panel {
                padding: 30px 20px 28px;
            }

            .visual-copy h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <div class="auth-shell">
        <section class="auth-info">
            <div class="visual-brand">
                <span class="visual-brand-mark" aria-hidden="true"></span>
                GloveXcel
            </div>

            <div class="visual-copy">
                <h1>Hospital Connected Rehabilitation</h1>
                <p>Secure access for admins, doctors, and patients in one connected workflow.</p>
            </div>
        </section>

        <section class="auth-panel">
            <div class="switch-row">
                <button class="switch-btn" id="adminRoleBtn" type="button">Admin</button>
                <button class="switch-btn active" id="doctorRoleBtn" type="button">Doctor</button>
                <button class="switch-btn" id="patientRoleBtn" type="button">Patient</button>
            </div>

            <h2 class="form-title" id="formTitle">Doctor Login</h2>
            <p class="form-subtitle" id="formSubtitle">Access your rehabilitation workspace with your registered credentials.</p>

            <form id="loginForm" class="auth-form">
                <label for="loginEmail">Email</label>
                <input id="loginEmail" type="email" required>

                <label for="loginPassword">Password</label>
                <input id="loginPassword" type="password" required>

                <button class="submit-btn" type="submit">Login</button>
            </form>

            <form id="doctorSignupForm" class="auth-form hidden">
                <label for="doctorName">Doctor Name</label>
                <input id="doctorName" type="text" required>

                <label for="doctorEmail">Email</label>
                <input id="doctorEmail" type="email" required>

                <label for="doctorPhone">Phone Number</label>
                <input id="doctorPhone" type="tel" autocomplete="tel" required>

                <label for="doctorPassword">Password</label>
                <input id="doctorPassword" type="password" required>

                <label for="doctorHospitalId">Hospital ID</label>
                <select id="doctorHospitalId" required>
                    <option value="">Select hospital</option>
                </select>

                <button class="submit-btn" type="submit">Create Doctor Account</button>
            </form>

            <form id="patientSignupForm" class="auth-form hidden">
                <label for="patientName">Patient Name</label>
                <input id="patientName" type="text" required>

                <label for="patientAge">Age</label>
                <input id="patientAge" type="number" min="0" required>

                <label for="patientEmail">Email</label>
                <input id="patientEmail" type="email" required>

                <label for="patientHospitalId">Primary Hospital ID</label>
                <select id="patientHospitalId" required>
                    <option value="">Select hospital</option>
                </select>

                <label for="patientPassword">Password</label>
                <input id="patientPassword" type="password" required>

                <button class="submit-btn" type="submit">Create Patient Account</button>
            </form>

            <form id="googleHospitalForm" class="auth-form hidden">
                <label for="googleHospitalId">Hospital ID</label>
                <select id="googleHospitalId" required>
                    <option value="">Select hospital</option>
                </select>

                <button class="submit-btn" type="submit">Continue</button>
            </form>

            <div class="auth-divider" id="googleAuthDivider">or</div>
            <button class="secondary-auth-btn" id="googleAuthBtn" type="button">
                <span class="google-mark" aria-hidden="true">G</span>
                Continue with Google
            </button>

            <div class="toggle-mode">
                <span id="togglePrompt">Need an account?</span>
                <button id="toggleModeBtn" type="button">Sign up</button>
            </div>

            <div id="statusMessage" class="message"></div>
        </section>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const API_BASE = 'http://localhost:3000/api/auth';

        const adminRoleBtn = document.getElementById('adminRoleBtn');
        const doctorRoleBtn = document.getElementById('doctorRoleBtn');
        const patientRoleBtn = document.getElementById('patientRoleBtn');
        const formTitle = document.getElementById('formTitle');
        const formSubtitle = document.getElementById('formSubtitle');
        const loginForm = document.getElementById('loginForm');
        const doctorSignupForm = document.getElementById('doctorSignupForm');
        const patientSignupForm = document.getElementById('patientSignupForm');
        const googleHospitalForm = document.getElementById('googleHospitalForm');
        const doctorHospitalIdSelect = document.getElementById('doctorHospitalId');
        const patientHospitalIdSelect = document.getElementById('patientHospitalId');
        const googleHospitalIdSelect = document.getElementById('googleHospitalId');
        const togglePrompt = document.getElementById('togglePrompt');
        const toggleModeBtn = document.getElementById('toggleModeBtn');
        const statusMessage = document.getElementById('statusMessage');
        const googleAuthDivider = document.getElementById('googleAuthDivider');
        const googleAuthBtn = document.getElementById('googleAuthBtn');

        let activeRole = 'doctor';
        let mode = 'login';
        let supabaseAuthClient = null;
        let supabaseConfigPromise = null;
        let googleSignupSession = null;
        let googleSignupRole = '';
        const roleVisualImages = {
            admin: './Assets/man-working-night.jpg',
            doctor: './Assets/patient-consulting-doctor.jpg',
            patient: './Assets/therapist-doctor-analyzing-heart-pulse-medical-consulting-hospital-ward-afroamerican-nurse.jpg'
        };

        const setMessage = (text, type) => {
            statusMessage.className = `message ${type || ''}`;
            statusMessage.textContent = text || '';
        };

        const escapeHtml = (unsafe) =>
            String(unsafe)
                .replaceAll('&', '&amp;')
                .replaceAll('<', '&lt;')
                .replaceAll('>', '&gt;')
                .replaceAll('"', '&quot;')
                .replaceAll("'", '&#039;');

        const renderHospitalOptions = (hospitals) => {
            const optionsMarkup = [
                '<option value="">Select hospital</option>',
                ...hospitals.map((hospital) => {
                    const hospitalId = escapeHtml(hospital.hospital_id || '');
                    const hospitalName = escapeHtml(hospital.name || 'Unnamed Hospital');
                    return `<option value="${hospitalId}">${hospitalId} - ${hospitalName}</option>`;
                })
            ].join('');

            doctorHospitalIdSelect.innerHTML = optionsMarkup;
            patientHospitalIdSelect.innerHTML = optionsMarkup;
            googleHospitalIdSelect.innerHTML = optionsMarkup;
        };

        const loadHospitals = async () => {
            try {
                const response = await fetch(`${API_BASE}/hospitals`);
                const data = await response.json();
                if (!response.ok) {
                    setMessage(data.message || 'Failed to load hospitals.', 'error');
                    return;
                }

                renderHospitalOptions(data.hospitals || []);
            } catch (error) {
                setMessage('Unable to load hospital list.', 'error');
            }
        };

        const updateRoleButtons = () => {
            adminRoleBtn.classList.toggle('active', activeRole === 'admin');
            doctorRoleBtn.classList.toggle('active', activeRole === 'doctor');
            patientRoleBtn.classList.toggle('active', activeRole === 'patient');
        };

        const updateRoleVisual = () => {
            const imageUrl = roleVisualImages[activeRole] || roleVisualImages.doctor;
            document.documentElement.style.setProperty('--auth-visual-image', `url("${imageUrl}")`);
        };

        const updateView = () => {
            const canSignup = activeRole !== 'admin';
            if (!canSignup && mode === 'signup') {
                mode = 'login';
            }

            updateRoleButtons();
            updateRoleVisual();

            const isLogin = mode === 'login';
            const isGoogleHospital = mode === 'google_hospital';
            const roleName = activeRole.charAt(0).toUpperCase() + activeRole.slice(1);
            formTitle.textContent = isGoogleHospital
                ? 'Select Hospital'
                : `${roleName} ${isLogin ? 'Login' : 'Signup'}`;
            formSubtitle.textContent = isGoogleHospital
                ? 'Choose your hospital to finish Google account setup.'
                : (isLogin
                    ? `Access your ${roleName.toLowerCase()} workspace with your registered credentials.`
                    : `Create a secure ${roleName.toLowerCase()} account connected to your hospital workflow.`);

            loginForm.classList.toggle('hidden', !isLogin);
            doctorSignupForm.classList.toggle('hidden', isLogin || isGoogleHospital || activeRole !== 'doctor');
            patientSignupForm.classList.toggle('hidden', isLogin || isGoogleHospital || activeRole !== 'patient');
            googleHospitalForm.classList.toggle('hidden', !isGoogleHospital);
            const canUseGoogle = isLogin && ['doctor', 'patient'].includes(activeRole);
            googleAuthDivider.classList.toggle('hidden', !canUseGoogle);
            googleAuthBtn.classList.toggle('hidden', !canUseGoogle);

            if (canSignup && !isGoogleHospital) {
                togglePrompt.textContent = isLogin ? 'Need an account?' : 'Already have an account?';
                toggleModeBtn.textContent = isLogin ? 'Sign up' : 'Login';
                togglePrompt.parentElement.classList.remove('hidden');
            } else {
                togglePrompt.parentElement.classList.add('hidden');
            }

            setMessage('');
        };

        const saveSession = (role, profile, token) => {
            localStorage.setItem('auth_role', role);
            localStorage.setItem('auth_profile', JSON.stringify(profile));
            if (token) {
                localStorage.setItem('auth_token', token);
            } else {
                localStorage.removeItem('auth_token');
            }

            if (role === 'doctor' && profile?.doctor_id) {
                localStorage.setItem('doctorId', profile.doctor_id);
            } else {
                localStorage.removeItem('doctorId');
            }

            if (role === 'patient' && profile?.patient_id) {
                localStorage.setItem('patientId', profile.patient_id);
            } else {
                localStorage.removeItem('patientId');
            }
        };

        const goToRolePage = (role) => {
            if (role === 'admin') {
                window.location.href = 'admin.html';
                return;
            }

            if (role === 'doctor') {
                window.location.href = 'doctor_app.html';
                return;
            }
            window.location.href = 'patient_app.html';
        };

        const getGoogleRedirectUrl = () => {
            const url = new URL(window.location.href);
            url.hash = '';
            url.searchParams.delete('code');
            url.searchParams.delete('error');
            url.searchParams.delete('error_code');
            url.searchParams.delete('error_description');
            return url.toString();
        };

        const getSupabaseClient = async () => {
            if (supabaseAuthClient) {
                return supabaseAuthClient;
            }

            if (!supabaseConfigPromise) {
                supabaseConfigPromise = fetch(`${API_BASE}/supabase-auth-config`)
                    .then(async (response) => {
                        const data = await response.json();
                        if (!response.ok) {
                            throw new Error(data.message || 'Supabase Auth is not configured.');
                        }
                        return data;
                    });
            }

            const config = await supabaseConfigPromise;
            if (!window.supabase?.createClient) {
                throw new Error('Supabase login library could not be loaded.');
            }

            supabaseAuthClient = window.supabase.createClient(
                config.supabaseUrl,
                config.supabaseAnonKey,
                { auth: { detectSessionInUrl: true, persistSession: true } }
            );
            return supabaseAuthClient;
        };

        const showGoogleHospitalForm = (session, selectedRole, googleProfile) => {
            googleSignupSession = session;
            googleSignupRole = selectedRole;
            activeRole = selectedRole;
            mode = 'google_hospital';
            updateView();
            const displayName = googleProfile?.name || googleProfile?.email || 'your Google account';
            setMessage(`Signed in as ${displayName}. Select your hospital to continue.`, '');
        };

        const finishGoogleLogin = async (session, selectedRole) => {
            const response = await fetch(`${API_BASE}/google-login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    access_token: session.access_token,
                    role: selectedRole
                })
            });

            const data = await response.json();
            if (!response.ok) {
                throw new Error(data.message || 'Google login failed.');
            }

            if (data.requiresHospital) {
                showGoogleHospitalForm(session, selectedRole, data.googleProfile);
                return;
            }

            if (!data.role || !data.profile || !data.token) {
                throw new Error('Google login response is missing role/profile data.');
            }

            activeRole = data.role;
            saveSession(data.role, data.profile, data.token);
            setMessage('Google login successful. Redirecting...', 'success');

            setTimeout(() => {
                goToRolePage(data.role);
            }, 500);
        };

        const handleGoogleRedirect = async () => {
            const pendingRole = sessionStorage.getItem('google_login_role');
            const hasOAuthResult = window.location.hash.includes('access_token=')
                || window.location.search.includes('code=')
                || window.location.search.includes('error=');

            if (!pendingRole && !hasOAuthResult) {
                return;
            }

            if (!['doctor', 'patient'].includes(pendingRole)) {
                sessionStorage.removeItem('google_login_role');
                return;
            }

            activeRole = pendingRole;
            mode = 'login';
            updateView();
            setMessage('Finishing Google login...', '');
            googleAuthBtn.disabled = true;

            try {
                const client = await getSupabaseClient();
                const params = new URLSearchParams(window.location.search);
                const oauthError = params.get('error_description') || params.get('error');
                if (oauthError) {
                    throw new Error(oauthError);
                }

                const authCode = params.get('code');
                const { data, error } = authCode
                    ? await client.auth.exchangeCodeForSession(authCode)
                    : await client.auth.getSession();
                if (error) {
                    throw error;
                }
                if (!data.session) {
                    throw new Error('Google session was not found.');
                }

                sessionStorage.removeItem('google_login_role');
                window.history.replaceState({}, document.title, getGoogleRedirectUrl());
                await finishGoogleLogin(data.session, pendingRole);
            } catch (error) {
                setMessage(error.message || 'Google login failed.', 'error');
            } finally {
                googleAuthBtn.disabled = false;
            }
        };

        adminRoleBtn.addEventListener('click', () => {
            activeRole = 'admin';
            updateView();
        });

        doctorRoleBtn.addEventListener('click', () => {
            activeRole = 'doctor';
            updateView();
        });

        patientRoleBtn.addEventListener('click', () => {
            activeRole = 'patient';
            updateView();
        });

        toggleModeBtn.addEventListener('click', () => {
            mode = mode === 'login' ? 'signup' : 'login';
            updateView();
        });

        googleAuthBtn.addEventListener('click', async () => {
            if (!['doctor', 'patient'].includes(activeRole) || mode !== 'login') {
                setMessage('Google login is available only for doctor and patient login.', 'error');
                return;
            }

            setMessage('Opening Google login...', '');
            googleAuthBtn.disabled = true;
            sessionStorage.setItem('google_login_role', activeRole);

            try {
                const client = await getSupabaseClient();
                const { error } = await client.auth.signInWithOAuth({
                    provider: 'google',
                    options: { redirectTo: getGoogleRedirectUrl() }
                });

                if (error) {
                    throw error;
                }
            } catch (error) {
                sessionStorage.removeItem('google_login_role');
                googleAuthBtn.disabled = false;
                setMessage(error.message || 'Unable to start Google login.', 'error');
            }
        });

        googleHospitalForm.addEventListener('submit', async (event) => {
            event.preventDefault();
            if (!googleSignupSession || !googleSignupRole) {
                setMessage('Google session was not found. Please try Google login again.', 'error');
                mode = 'login';
                updateView();
                return;
            }

            const hospitalId = googleHospitalIdSelect.value.trim();
            if (!hospitalId) {
                setMessage('Please select a hospital.', 'error');
                return;
            }

            setMessage('Creating your account...', '');

            try {
                const response = await fetch(`${API_BASE}/google-complete-signup`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        access_token: googleSignupSession.access_token,
                        role: googleSignupRole,
                        hospital_id: hospitalId
                    })
                });

                const data = await response.json();
                if (!response.ok) {
                    setMessage(data.message || 'Google account setup failed.', 'error');
                    return;
                }

                googleSignupSession = null;
                googleSignupRole = '';

                if (data.requiresApproval) {
                    mode = 'login';
                    activeRole = 'doctor';
                    updateView();
                    setMessage(data.message || 'Doctor account created. Please wait for admin approval.', 'success');
                    return;
                }

                if (!data.role || !data.profile || !data.token) {
                    setMessage('Google signup response is missing role/profile data.', 'error');
                    return;
                }

                saveSession(data.role, data.profile, data.token);
                setMessage('Account created. Redirecting...', 'success');
                setTimeout(() => {
                    goToRolePage(data.role);
                }, 500);
            } catch (error) {
                setMessage('Unable to connect to server.', 'error');
            }
        });

        loginForm.addEventListener('submit', async (event) => {
            event.preventDefault();
            setMessage('Checking credentials...', '');

            const body = {
                email: document.getElementById('loginEmail').value.trim(),
                password: document.getElementById('loginPassword').value,
                role: activeRole
            };

            try {
                const response = await fetch(`${API_BASE}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });

                const data = await response.json();

                if (!response.ok) {
                    setMessage(data.message || 'Login failed.', 'error');
                    return;
                }

                const authenticatedRole = data.role;
                const profile = data.profile;
                const token = data.token;

                if (!authenticatedRole || !profile) {
                    setMessage('Login response is missing role/profile data.', 'error');
                    return;
                }

                activeRole = authenticatedRole;
                saveSession(authenticatedRole, profile, token);
                setMessage('Login successful. Redirecting...', 'success');

                setTimeout(() => {
                    goToRolePage(authenticatedRole);
                }, 500);
            } catch (error) {
                setMessage('Unable to connect to server.', 'error');
            }
        });

        doctorSignupForm.addEventListener('submit', async (event) => {
            event.preventDefault();
            setMessage('Creating doctor account...', '');

            const body = {
                name: document.getElementById('doctorName').value.trim(),
                email: document.getElementById('doctorEmail').value.trim(),
                phone: document.getElementById('doctorPhone').value.trim(),
                password: document.getElementById('doctorPassword').value,
                hospital_id: document.getElementById('doctorHospitalId').value.trim()
            };

            try {
                const response = await fetch(`${API_BASE}/doctor/signup`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });

                const data = await response.json();
                if (!response.ok) {
                    setMessage(data.message || 'Doctor signup failed.', 'error');
                    return;
                }

                mode = 'login';
                updateView();
                document.getElementById('loginEmail').value = body.email;
                setMessage(`Doctor account created. Doctor ID: ${data.doctor.doctor_id}`, 'success');
            } catch (error) {
                setMessage('Unable to connect to server.', 'error');
            }
        });

        patientSignupForm.addEventListener('submit', async (event) => {
            event.preventDefault();
            setMessage('Creating patient account...', '');

            const body = {
                name: document.getElementById('patientName').value.trim(),
                age: Number(document.getElementById('patientAge').value),
                email: document.getElementById('patientEmail').value.trim(),
                primary_hospital_id: document.getElementById('patientHospitalId').value.trim(),
                password: document.getElementById('patientPassword').value
            };

            try {
                const response = await fetch(`${API_BASE}/patient/signup`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });

                const data = await response.json();
                if (!response.ok) {
                    setMessage(data.message || 'Patient signup failed.', 'error');
                    return;
                }

                mode = 'login';
                activeRole = 'patient';
                updateView();
                document.getElementById('loginEmail').value = body.email;
                setMessage(`Patient account created. Patient ID: ${data.patient.patient_id}`, 'success');
            } catch (error) {
                setMessage('Unable to connect to server.', 'error');
            }
        });

        loadHospitals();
        updateView();
        handleGoogleRedirect();
    </script>
</body>
</html>
