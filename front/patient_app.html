<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GloveXcel — Patient Console</title>
  <meta name="description" content="GloveXcel patient rehabilitation console. Calibrate, run preloaded exercises, and monitor live glove data with a 3D digital twin." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet" />

  <style>
    /* ═══════════════════════════════════════════════════════════════════════
       DESIGN TOKENS
    ═══════════════════════════════════════════════════════════════════════ */
    :root {
      /* Colour palette */
      --c-bg:          #0d1117;
      --c-surface:     #161b22;
      --c-surface-2:   #1c2230;
      --c-border:      #2d3748;
      --c-brand:       #4e8ef7;
      --c-brand-hover: #2563eb;
      --c-ok:          #28a745;
      --c-warn:        #d18a00;
      --c-danger:      #d94e4e;
      --c-ink:         #e6edf3;
      --c-ink-2:       #b0bec5;
      --c-ink-muted:   #8b9cb6;

      /* Layout */
      --sidebar-w:  220px;
      --canvas-w:   460px;
      --header-h:   54px;

      /* Misc */
      --radius-sm:  6px;
      --radius-md:  10px;
      --radius-lg:  14px;
      --shadow-md:  0 4px 24px rgba(0,0,0,0.45);
      --trans:      0.16s ease;
    }

    /* ═══════════════════════════════════════════════════════════════════════
       RESET
    ═══════════════════════════════════════════════════════════════════════ */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', 'Segoe UI', Tahoma, sans-serif;
      font-size: 14px;
      line-height: 1.5;
      background: var(--c-bg);
      color: var(--c-ink);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ═══════════════════════════════════════════════════════════════════════
       HEADER (persistent)
    ═══════════════════════════════════════════════════════════════════════ */
    #app-header {
      height: var(--header-h);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 0 20px;
      background: var(--c-surface);
      border-bottom: 1px solid var(--c-border);
      z-index: 20;
      box-shadow: 0 1px 6px rgba(0,0,0,0.3);
    }

    .header-logo {
      font-size: 17px;
      font-weight: 700;
      letter-spacing: -0.4px;
      background: linear-gradient(130deg, var(--c-brand) 0%, #a78bfa 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      user-select: none;
    }

    .header-subtitle {
      font-size: 12px;
      color: var(--c-ink-muted);
      font-weight: 400;
    }

    .header-spacer { flex: 1; }

    /* BLE connection status pill */
    #ble-pill {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 5px 13px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 600;
      border: 1px solid var(--c-border);
      color: var(--c-ink-muted);
      background: var(--c-surface-2);
      transition: var(--trans);
      user-select: none;
    }

    #ble-pill.connected {
      color: #4ade80;
      border-color: #166534;
      background: #052e16;
    }

    #ble-pill .ble-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: currentColor;
      flex-shrink: 0;
    }

    #ble-pill.connected .ble-dot {
      box-shadow: 0 0 6px 2px #4ade8077;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.4; }
    }

    /* ═══════════════════════════════════════════════════════════════════════
       MAIN GRID (3 areas: sidebar | view | canvas)
    ═══════════════════════════════════════════════════════════════════════ */
    #app-body {
      flex: 1;
      min-height: 0;
      display: grid;
      grid-template-columns: var(--sidebar-w) 1fr var(--canvas-w);
      grid-template-areas: "sidebar view canvas";
      overflow: hidden;
    }

    /* ═══════════════════════════════════════════════════════════════════════
       SIDEBAR (persistent)
    ═══════════════════════════════════════════════════════════════════════ */
    #sidebar {
      grid-area: sidebar;
      background: var(--c-surface);
      border-right: 1px solid var(--c-border);
      display: flex;
      flex-direction: column;
      padding: 16px 10px;
      gap: 3px;
      overflow-y: auto;
    }

    .sidebar-section-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      color: var(--c-ink-muted);
      padding: 0 8px;
      margin: 4px 0 6px;
    }

    .nav-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      padding: 9px 12px;
      border: 1px solid transparent;
      border-radius: var(--radius-md);
      background: transparent;
      color: var(--c-ink-muted);
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      text-align: left;
      transition: var(--trans);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .nav-btn:hover {
      background: var(--c-surface-2);
      color: var(--c-ink);
      border-color: var(--c-border);
    }

    .nav-btn.active {
      background: linear-gradient(135deg, #172040 0%, #131c36 100%);
      color: var(--c-brand);
      border-color: #2a3f6e;
      font-weight: 600;
    }

    .nav-icon {
      font-size: 15px;
      width: 18px;
      text-align: center;
      flex-shrink: 0;
    }

    .sidebar-divider {
      height: 1px;
      background: var(--c-border);
      margin: 8px 4px;
      border: none;
    }

    .sidebar-footer {
      margin-top: auto;
      padding: 10px 8px 4px;
      font-size: 11px;
      color: var(--c-ink-muted);
      line-height: 1.6;
      border-top: 1px solid var(--c-border);
    }

    /* ═══════════════════════════════════════════════════════════════════════
       VIEW CONTAINER (dynamic — HTML injected here)
    ═══════════════════════════════════════════════════════════════════════ */
    #view-container {
      grid-area: view;
      overflow-y: auto;
      padding: 22px 20px;
      background: var(--c-bg);
    }

    /* ── Styles shared by all injected view fragments ── */

    .view-header { margin-bottom: 18px; }

    .view-title {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.3px;
      margin-bottom: 3px;
    }

    .view-subtitle { font-size: 13px; color: var(--c-ink-muted); }

    .status-bar {
      background: var(--c-surface);
      border: 1px solid var(--c-border);
      border-left: 4px solid var(--c-brand);
      border-radius: var(--radius-lg);
      padding: 10px 14px;
      margin-bottom: 16px;
      color: var(--c-ink-2);
      font-size: 13px;
      line-height: 1.55;
    }

    .card {
      background: var(--c-surface);
      border: 1px solid var(--c-border);
      border-radius: var(--radius-lg);
      padding: 16px;
      margin-bottom: 14px;
      box-shadow: var(--shadow-md);
    }

    .card-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--c-ink);
      margin-bottom: 12px;
    }

    .actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }

    .note {
      font-size: 12px;
      color: var(--c-ink-muted);
      line-height: 1.6;
      margin: 0;
    }

    /* Buttons */
    button, select, input[type="number"] {
      font-family: inherit;
      font-size: 13px;
      border-radius: var(--radius-sm);
      transition: var(--trans);
    }

    button {
      padding: 8px 14px;
      border: none;
      cursor: pointer;
      background: var(--c-brand);
      color: #fff;
      font-weight: 600;
    }

    button:hover:not(:disabled)   { background: var(--c-brand-hover); }
    button:disabled                { opacity: 0.45; cursor: default; }

    button.btn-secondary {
      background: var(--c-surface-2);
      color: var(--c-ink-2);
      border: 1px solid var(--c-border);
    }

    button.btn-secondary:hover:not(:disabled) {
      background: var(--c-border);
      color: var(--c-ink);
    }

    select, input[type="number"] {
      padding: 7px 10px;
      border: 1px solid var(--c-border);
      background: var(--c-surface-2);
      color: var(--c-ink);
      outline: none;
    }

    select:focus, input[type="number"]:focus {
      border-color: var(--c-brand);
    }

    select { min-width: 130px; }

    /* Pills */
    .pill {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
      border: 1px solid;
      margin-top: 8px;
    }

    .pill-ok   { color: #4ade80; background: #052e16; border-color: #166534; }
    .pill-warn { color: #facc15; background: #1c1a08; border-color: #854d0e; }

    /* Mini grid (raw sensor cards) */
    .mini-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
      gap: 8px;
      margin-top: 10px;
    }

    .mini-card {
      border: 1px solid var(--c-border);
      border-radius: var(--radius-md);
      padding: 10px;
      background: var(--c-surface-2);
      font-size: 12px;
      color: var(--c-ink-muted);
      line-height: 1.65;
    }

    .mini-card strong {
      display: block;
      color: var(--c-ink);
      font-size: 13px;
      margin-bottom: 3px;
    }

    /* Match grid (exercise comparison bars) */
    .match-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 8px;
      margin-top: 10px;
    }

    .match-card {
      border: 1px solid var(--c-border);
      border-radius: var(--radius-md);
      padding: 10px;
      background: var(--c-surface-2);
      font-size: 12px;
      color: var(--c-ink-muted);
      line-height: 1.7;
    }

    .match-card strong {
      display: block;
      color: var(--c-ink);
      font-size: 13px;
      margin-bottom: 3px;
    }

    .match-hero {
      border-color: #2a3f6e;
      background: linear-gradient(150deg, var(--c-surface) 0%, #111827 100%);
    }

    .bar-track {
      width: 100%;
      height: 7px;
      background: #1e2b3f;
      border-radius: 999px;
      overflow: hidden;
      margin-top: 7px;
      border: 1px solid var(--c-border);
    }

    .bar-fill {
      height: 100%;
      width: 0%;
      border-radius: 999px;
      transition: width 0.2s linear, background-color 0.2s linear;
    }

    /* Doctor values table */
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
      font-size: 12px;
    }

    th, td {
      border: 1px solid var(--c-border);
      padding: 8px 10px;
      text-align: center;
      color: var(--c-ink-muted);
    }

    th {
      background: var(--c-surface-2);
      color: var(--c-ink);
      font-weight: 600;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    td input[type="number"] {
      width: 78px;
      text-align: center;
      padding: 4px 6px;
    }

    /* View loading / error state */
    .view-loading {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 60%;
      color: var(--c-ink-muted);
      font-size: 14px;
      gap: 10px;
    }

    .view-error {
      background: #2a1010;
      border: 1px solid var(--c-danger);
      border-radius: var(--radius-lg);
      padding: 16px 18px;
      color: #f87171;
      font-size: 13px;
      line-height: 1.7;
      margin-top: 16px;
    }

    .view-error code { font-family: monospace; font-size: 12px; }

    /* ═══════════════════════════════════════════════════════════════════════
       CANVAS PANEL (permanent — Three.js canvas lives here)
    ═══════════════════════════════════════════════════════════════════════ */
    #canvas-panel {
      grid-area: canvas;
      display: flex;
      flex-direction: column;
      background: var(--c-surface);
      border-left: 1px solid var(--c-border);
      overflow: hidden;
    }

    #canvas-panel-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      border-bottom: 1px solid var(--c-border);
      flex-shrink: 0;
    }

    #canvas-panel-bar .panel-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--c-ink-muted);
      text-transform: uppercase;
      letter-spacing: 0.07em;
    }

    #model-status {
      font-size: 11px;
      color: var(--c-ink-muted);
      font-weight: 400;
      font-style: italic;
    }

    /* canvas-wrapper fills the remaining space; ThreeEngine appends its canvas here */
    #canvas-wrapper {
      flex: 1;
      min-height: 0;
      overflow: hidden;
      position: relative;
    }

    #canvas-wrapper canvas {
      display: block;
      width: 100% !important;
      height: 100% !important;
    }

    /* ═══════════════════════════════════════════════════════════════════════
       RESPONSIVE — collapse to single-column on narrow screens
    ═══════════════════════════════════════════════════════════════════════ */
    @media (max-width: 1080px) {
      :root { --canvas-w: 360px; --sidebar-w: 196px; }
    }

    @media (max-width: 780px) {
      #app-body {
        grid-template-columns: 1fr;
        grid-template-rows: auto 1fr auto;
        grid-template-areas: "sidebar" "view" "canvas";
      }

      #sidebar {
        flex-direction: row;
        border-right: none;
        border-bottom: 1px solid var(--c-border);
        padding: 8px 10px;
        overflow-x: auto;
        gap: 6px;
      }

      .sidebar-section-label,
      .sidebar-divider,
      .sidebar-footer { display: none; }

      .nav-btn { flex-shrink: 0; }

      #canvas-panel {
        border-left: none;
        border-top: 1px solid var(--c-border);
        height: 280px;
        flex-shrink: 0;
      }
    }
    /* ═══════════════════════════════════════════════════════════════════════
       CALIBRATION WARNING BANNER
       Inserted programmatically by exercise view controllers when
       state.patientCalibration.ready === false on mount.
    ═══════════════════════════════════════════════════════════════════════ */
    .calib-warning-banner {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      background: #1c1209;
      border: 1px solid #7c4a03;
      border-left: 4px solid var(--c-warn);
      border-radius: var(--radius-lg);
      padding: 14px 16px;
      margin-bottom: 14px;
      color: #fbbf24;
      font-size: 13px;
      line-height: 1.6;
      animation: bannerIn 0.25s ease;
    }

    @keyframes bannerIn {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .calib-warning-icon { font-size: 18px; flex-shrink: 0; line-height: 1; }

    .calib-warning-body { flex: 1; }
    .calib-warning-body strong { display: block; margin-bottom: 3px; color: #fde68a; }

    .calib-warning-link {
      color: var(--c-brand);
      text-decoration: underline;
      font-weight: 600;
      cursor: pointer;
      border: none;
      background: none;
      padding: 0;
      font-size: inherit;
      font-family: inherit;
      line-height: inherit;
    }

    .calib-warning-link:hover { color: #93c5fd; }

    .calib-warning-dismiss {
      background: transparent;
      border: none;
      color: var(--c-ink-muted);
      cursor: pointer;
      font-size: 14px;
      padding: 0 4px;
      flex-shrink: 0;
      line-height: 1;
      align-self: center;
    }

    .calib-warning-dismiss:hover { color: var(--c-ink); background: transparent; }

    /* ═══════════════════════════════════════════════════════════════════════
       VIEW NAMESPACE SCOPING
       Each view fragment is wrapped in a unique namespace class.
       Any view-specific overrides must be nested under its namespace.
    ═══════════════════════════════════════════════════════════════════════ */

    /* Example — add view-specific overrides here as the app grows:
    .view-namespace-calibration .card { border-color: #1a3a6e; }
    .view-namespace-preloaded  .match-hero { background: #0d1a2e; }
    .view-namespace-live       .bar-fill   { transition: width 0.1s linear; }
    */

  </style>
  <!-- MQTT client for publishing live glove telemetry from the patient app -->
  <script src="./js/mqtt.min.js"></script>
</head>
<body>

  <!-- ════════════════════════════════════════════════════════════════════
       PERSISTENT HEADER
  ════════════════════════════════════════════════════════════════════ -->
  <header id="app-header">
    <span class="header-logo">GloveXcel</span>
    <span class="header-subtitle">Patient Console</span>
    <div class="header-spacer"></div>

    <!-- Global BLE connection status pill -->
    <div id="ble-pill" role="status" aria-live="polite" aria-label="BLE connection status">
      <span class="ble-dot"></span>
      <span id="ble-status-text">Not connected</span>
    </div>
  </header>

  <!-- ════════════════════════════════════════════════════════════════════
       MAIN GRID: Sidebar | View Container | Canvas Panel
  ════════════════════════════════════════════════════════════════════ -->
  <div id="app-body">

    <!-- ── Sidebar (persistent nav) ──────────────────────────────────── -->
    <nav id="sidebar" aria-label="Patient workflow navigation">
      <div class="sidebar-section-label">Patient Workflow</div>

      <button
        class="nav-btn active"
        data-route="calibration"
        id="nav-calibration"
        type="button"
        aria-current="page"
      >
        <span class="nav-icon" aria-hidden="true">🎯</span>
        Calibration
      </button>

      <button
        class="nav-btn"
        data-route="preloaded"
        id="nav-preloaded"
        type="button"
        aria-current="false"
      >
        <span class="nav-icon" aria-hidden="true">🏃</span>
        Preloaded Session
      </button>

      <button
        class="nav-btn"
        data-route="live"
        id="nav-live"
        type="button"
        aria-current="false"
      >
        <span class="nav-icon" aria-hidden="true">📡</span>
        Live Session
      </button>

      <hr class="sidebar-divider" />

      <div class="sidebar-footer">
        Serve via a local HTTP&nbsp;server — <code>fetch()</code> is blocked on <code>file://</code>.
      </div>
    </nav>

    <!-- ── Dynamic view container ─────────────────────────────────────── -->
    <main id="view-container" role="main" aria-live="polite">
      <div class="view-loading">
        <span>Loading view…</span>
      </div>
    </main>

    <!-- ── Permanent 3D canvas panel ─────────────────────────────────── -->
    <aside id="canvas-panel" aria-label="3D hand digital twin">
      <div id="canvas-panel-bar">
        <span class="panel-label">3D Digital Twin</span>
        <span id="model-status">Initialising…</span>
      </div>

      <!--
        ThreeEngine.init() appends renderer.domElement here.
        This element must never be removed from the DOM.
      -->
      <div id="canvas-wrapper"></div>
    </aside>

  </div><!-- /#app-body -->

  <!-- ════════════════════════════════════════════════════════════════════
       IMPORT MAP  (Three.js via CDN — matches original pages exactly)
  ════════════════════════════════════════════════════════════════════ -->
  <script type="importmap">
  {
    "imports": {
      "three":         "https://unpkg.com/three@0.164.1/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.164.1/examples/jsm/"
    }
  }
  </script>

  <!-- ════════════════════════════════════════════════════════════════════
       BOOTSTRAP  (imports singletons, initialises engine, creates router)
  ════════════════════════════════════════════════════════════════════ -->
  <script type="module">
    import { GloveState }   from './js/gloveState.js';
    import { ThreeEngine }  from './js/threeEngine.js';
    import { createRouter } from './js/router.js';

    // ── 1. Initialise the WebGL engine inside #canvas-wrapper ───────────
    //    (Builds the scene, loads the GLB, starts the rAF loop — all once.)
    const canvasWrapper = document.getElementById('canvas-wrapper');
    ThreeEngine.init(canvasWrapper);

    // Forward model status to the panel header
    const modelStatusEl = document.getElementById('model-status');
    ThreeEngine.onModelStatus = (msg) => {
      if (modelStatusEl) modelStatusEl.textContent = msg;
    };

    // ── 2. Wire the BLE status pill to GloveState ───────────────────────
    const blePill      = document.getElementById('ble-pill');
    const bleStatusTxt = document.getElementById('ble-status-text');

    function updateBlePill(isConnected) {
      blePill.classList.toggle('connected', isConnected);
      bleStatusTxt.textContent = isConnected ? 'Glove connected' : 'Not connected';
    }

    // GloveState fires this callback on every connect/disconnect
    GloveState.onConnectionChange = updateBlePill;

    // ── 3. Create the router ────────────────────────────────────────────
    const viewContainer = document.getElementById('view-container');
    const router        = createRouter(viewContainer, GloveState, ThreeEngine);

    // ── 4. Bind sidebar navigation buttons ─────────────────────────────
    document.querySelectorAll('[data-route]').forEach(btn => {
      btn.addEventListener('click', () => router.go(btn.dataset.route));
    });

    // ── 5. Navigate to the initial route (URL hash or default) ─────────
    // Handles deep-links (#calibration, #/live, etc.) and page refreshes.
    router.initial();

    // ── Note: spa:navigate custom event ────────────────────────────────
    // View controllers can dispatch:
    //   window.dispatchEvent(new CustomEvent('spa:navigate', { detail: { route: 'calibration' } }));
    // The router.js hashchange + spa:navigate listeners handle this without
    // any wiring needed here in the shell.
  </script>

</body>
</html>
