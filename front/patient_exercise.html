<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Patient Exercise</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "Segoe UI", Tahoma, sans-serif;
      background: radial-gradient(circle at top left, #eef7ff 0%, #f8fbfd 62%);
      color: #23344d;
    }

    .card {
      width: min(760px, 92vw);
      background: #ffffff;
      border: 1px solid #d8e3f2;
      border-radius: 14px;
      padding: 20px;
      box-shadow: 0 12px 30px rgba(25, 45, 79, 0.1);
    }

    h1 {
      margin: 0 0 10px;
      font-size: 24px;
    }

    p {
      margin: 0 0 10px;
      color: #4a607f;
      line-height: 1.5;
    }

    .actions {
      margin-top: 14px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    button {
      border: none;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 14px;
      cursor: pointer;
      color: #fff;
      background: #2266d8;
    }
  </style>
</head>
<body>
  <section class="card">
    <h1>Patient Exercise</h1>
    <p>This page is reserved for the dedicated patient exercise workflow.</p>
    <p>Requested feature noted: exercise should run in a separate page from patient dashboard.</p>
    <div class="actions">
      <button type="button" onclick="window.location.href='./glove_test.html'">Back to Patient Dashboard</button>
    </div>
  </section>
</body>
</html>
