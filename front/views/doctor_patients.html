<div class="view-namespace-doctor-patients">
  <div class="view-header">
    <h2 class="view-title">Patients</h2>
    <p class="view-subtitle">Review channeling requests and manage approved patients.</p>
  </div>

  <section class="panel">
    <div class="panel-title">Channeling Requests</div>
    <div id="channelRequestsList" class="doctor-patient-list">Loading requests...</div>
  </section>

  <section class="panel">
    <div class="panel-title">My Patients</div>
    <form id="doctorPatientSearchForm" class="patient-search" role="search">
      <label class="sr-only" for="doctorPatientSearchInput">Search patients</label>
      <input
        id="doctorPatientSearchInput"
        class="patient-search-input"
        type="search"
        placeholder="Search by name, ID, email, or hospital"
        autocomplete="off"
      />
      <button class="btn-secondary patient-search-btn" type="submit">Search</button>
    </form>
    <div id="doctorPatientsStatus" class="patient-status" aria-live="polite"></div>
    <div id="doctorPatientsList" class="doctor-patient-list">Loading patients...</div>
  </section>

  <style>
    .view-namespace-doctor-patients .doctor-patient-list {
      display: grid;
      gap: 12px;
    }
    .view-namespace-doctor-patients .patient-card {
      background: var(--c-surface-2);
      border: 1px solid var(--c-border);
      border-radius: var(--radius-sm);
      padding: 14px;
    }
    .view-namespace-doctor-patients .patient-card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
    }
    .view-namespace-doctor-patients .patient-name {
      color: #00395f;
      font-size: 15px;
      font-weight: 800;
      margin-bottom: 4px;
    }
    .view-namespace-doctor-patients .patient-meta {
      color: var(--c-text-muted);
      font-size: 13px;
      line-height: 1.5;
    }
    .view-namespace-doctor-patients .request-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .view-namespace-doctor-patients .patient-search {
      display: flex;
      gap: 8px;
      margin: 0 0 12px;
    }
    .view-namespace-doctor-patients .patient-search-input {
      min-width: 0;
      flex: 1;
      border: 1px solid var(--c-border);
      border-radius: var(--radius-sm);
      background: var(--c-surface-2);
      color: var(--c-text);
      font: inherit;
      padding: 10px 12px;
    }
    .view-namespace-doctor-patients .patient-search-input::placeholder {
      color: var(--c-text-muted);
    }
    .view-namespace-doctor-patients .patient-search-btn {
      flex: 0 0 auto;
    }
    .view-namespace-doctor-patients .patient-status {
      min-height: 18px;
      color: var(--c-text-muted);
      font-size: 13px;
      line-height: 1.4;
      margin-bottom: 8px;
    }
    .view-namespace-doctor-patients .remove-patient-btn {
      border-color: rgba(248, 113, 113, 0.45);
      color: #fecaca;
    }
    .view-namespace-doctor-patients .remove-patient-btn:disabled {
      cursor: wait;
      opacity: 0.7;
    }
    .view-namespace-doctor-patients .empty-state,
    .view-namespace-doctor-patients .error-state {
      color: var(--c-text-muted);
      font-size: 13px;
      line-height: 1.5;
    }
    .view-namespace-doctor-patients .error-state {
      color: #fca5a5;
    }
    .view-namespace-doctor-patients .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }
    @media (max-width: 640px) {
      .view-namespace-doctor-patients .patient-card-header,
      .view-namespace-doctor-patients .patient-search {
        flex-direction: column;
      }
      .view-namespace-doctor-patients .patient-search-btn {
        width: 100%;
      }
    }
  </style>
</div>
